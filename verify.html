<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אימות אימייל — למדני אנגלית</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f8fafc; margin:0; font-family:inherit; }
        .v-box { background:#fff; border-radius:1.2rem; padding:2.5rem 2rem; width:min(92vw,380px); text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.10); }
        .v-icon { font-size:4rem; margin-bottom:1rem; }
        .v-title { font-size:1.3rem; font-weight:800; color:#0f172a; margin-bottom:0.6rem; }
        .v-sub   { font-size:0.9rem; color:#475569; margin-bottom:1.5rem; line-height:1.5; }
        .v-btn   { display:inline-block; padding:0.75rem 2rem; background:#2563eb; color:#fff; border:none; border-radius:0.6rem; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; }
        .v-btn:hover { background:#1d4ed8; }
        #loadingView .spin { display:inline-block; animation:spin 1s linear infinite; font-size:2rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="v-box">
    <div id="loadingView">
        <div class="spin">⟳</div>
        <div style="margin-top:0.75rem;color:#475569;font-size:0.95rem;">מאמת את כתובת האימייל...</div>
    </div>
    <div id="successView" style="display:none">
        <div class="v-icon">✅</div>
        <div class="v-title">האימייל אומת בהצלחה!</div>
        <div class="v-sub">החשבון שלך פעיל כעת.<br>תוכל להתחבר ולהתחיל ללמוד.</div>
        <a href="index.html?verified=1" class="v-btn">כנס לאתר →</a>
    </div>
    <div id="errorView" style="display:none">
        <div class="v-icon">⚠️</div>
        <div class="v-title">שגיאה באימות</div>
        <div id="verifyErrMsg" class="v-sub"></div>
        <a href="index.html" class="v-btn">חזור לדף הבית</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
    var firebaseConfig = {
        apiKey:            "AIzaSyDttv79Uf6CVsJob2S6xVyAOfE6hkvuq1U",
        authDomain:        "lamdani-eng.firebaseapp.com",
        projectId:         "lamdani-eng",
        storageBucket:     "lamdani-eng.firebasestorage.app",
        messagingSenderId: "95853150948",
        appId:             "1:95853150948:web:454dfcbfa89cc0ea5f62f1"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    var params  = new URLSearchParams(window.location.search);
    var mode    = params.get('mode');
    var oobCode = params.get('oobCode');

    function showSuccess() {
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('successView').style.display = 'block';
    }
    function showError(msg) {
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('errorView').style.display   = 'block';
        document.getElementById('verifyErrMsg').textContent  = msg;
    }

    if (mode === 'verifyEmail' && oobCode) {
        auth.applyActionCode(oobCode)
            .then(showSuccess)
            .catch(function(e) {
                var msgs = {
                    'auth/invalid-action-code': 'הקישור פג תוקף או כבר שומש — בקש מייל אימות חדש.',
                    'auth/expired-action-code': 'הקישור פג תוקף — בקש מייל אימות חדש.'
                };
                showError(msgs[e.code] || ('שגיאה: ' + e.code));
            });
    } else if (mode === 'resetPassword' && oobCode) {
        // הפנייה לדף הראשי לטיפול באיפוס סיסמה
        window.location.href = 'index.html?mode=resetPassword&oobCode=' + encodeURIComponent(oobCode);
    } else {
        showError('קישור לא תקין.');
    }
</script>
</body>
</html>
