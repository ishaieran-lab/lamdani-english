// ניווט
// ════════════════════════════════════════════════════════════════
var VIEWS = ['viewSelect','viewTopics','viewCards','viewQuiz','viewQuizScore'];

function showView(id) {
    VIEWS.forEach(function(v){ document.getElementById(v).style.display='none'; });
    document.getElementById(id).style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
}

var curLevel = 1;

function openLevel(n) {
    curLevel = n;
    document.getElementById('levelTitle').textContent = 'שלב ' + n;
    var items = SHICHON.filter(function(s){ return s.level === n; });
    document.getElementById('topicCards').innerHTML = items.map(function(s, i) {
        var realIdx = SHICHON.indexOf(s);
        var phrases = s.cards.filter(function(c){return c.type==="phrase";}).length;
        return '<div class="topic-tile" onclick="openTopic(' + realIdx + ')">' +
            '<div class="topic-tile-he">' + s.title + '</div>' +
            '<div class="topic-tile-en">' + s.desc + '</div>' +
            '<div class="topic-tile-count">' + phrases + ' ביטויים · ' + s.cards.length + ' כרטיסיות</div>' +
            '<button class="sh-quiz-tile-btn" onclick="openQuiz(' + realIdx + '); event.stopPropagation()">בוחן ✎</button>' +
        '</div>';
    }).join('');
    showView('viewTopics');
}

// ════════════════════════════════════════════════════════════════
// כרטיסיות
// ════════════════════════════════════════════════════════════════
var curTopicIdx = 0;
var curCardIdx  = 0;

function openTopic(idx) {
    curTopicIdx = idx;
    curCardIdx  = 0;
    document.getElementById('cardsLabel').textContent = SHICHON[idx].title;
    document.getElementById('shDoneBox').style.display = 'none';
    document.getElementById('shCard').style.display    = 'block';
    document.getElementById('shNavRow') && (document.getElementById('shNavRow').style.display = 'flex');
    renderCard();
    showView('viewCards');
}

function renderCard() {
    var topic = SHICHON[curTopicIdx];
    var cards = topic.cards;
    var c     = cards[curCardIdx];
    var total = cards.length;

    document.getElementById('shBar').style.width = ((curCardIdx + 1) / total * 100) + '%';
    document.getElementById('shProg').textContent = (curCardIdx + 1) + ' / ' + total;

    var badge = c.type === 'phrase' ? 'ביטוי' : 'תשובה אפשרית';
    var badgeCls = c.type === 'phrase' ? 'sh-badge-phrase' : 'sh-badge-response';
    document.getElementById('shBadge').innerHTML = '<span class="sh-badge ' + badgeCls + '">' + badge + '</span>';
    document.getElementById('shEn').textContent = c.en;
    document.getElementById('shHe').textContent = c.he;

    document.getElementById('shPrevBtn').style.display = curCardIdx === 0 ? 'none' : 'inline-flex';
    var shNext = document.getElementById('shNextBtn');
    if (curCardIdx === total - 1) { shNext.className = 'btn-primary'; shNext.textContent = 'סיום ✓'; }
    else                          { shNext.className = 'btn-next-img'; shNext.textContent = 'הבא'; }
}

function shNext() {
    var cards = SHICHON[curTopicIdx].cards;
    if (curCardIdx < cards.length - 1) {
        curCardIdx++;
        renderCard();
    } else {
        document.getElementById('shCard').style.display    = 'none';
        document.querySelector('.sh-nav-row').style.display = 'none';
        document.getElementById('shDoneBox').style.display  = 'block';
    }
}

function shPrev() {
    if (curCardIdx > 0) { curCardIdx--; renderCard(); }
}

function shRestart() {
    curCardIdx = 0;
    document.getElementById('shCard').style.display    = 'block';
    document.querySelector('.sh-nav-row').style.display = 'flex';
    document.getElementById('shDoneBox').style.display  = 'none';
    renderCard();
}

// ════════════════════════════════════════════════════════════════
// בוחן — נרמול ובדיקת תשובות
// ════════════════════════════════════════════════════════════════

function normalizeHe(s) {
    return s.trim()
        .replace(/[?.!,،׃"'«»\-–]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function generateAlts(he) {
    var alts = [he];

    // Space-slash-space " / ": "A part1 / B part2"
    // → alt1: "A part1" + trailing punct, alt2: firstWord(A) + " " + "B part2"
    if (he.indexOf(' / ') !== -1) {
        var sParts = he.split(' / ');
        var punc = (he.match(/[?.!]+$/) || [''])[0];
        alts.push(sParts[0] + punc);
        alts.push(sParts[0]);
        var firstWord = sParts[0].split(' ')[0];
        alts.push(firstWord + ' ' + sParts[1]);
    }

    // No-space slash X/Y — generate masculine (first) and feminine (concat short suffix or swap word)
    if (/\S+\/\S+/.test(he)) {
        var masc = he.replace(/(\S+)\/(\S+)/g, function(m, a, b) { return a; });
        var fem  = he.replace(/(\S+)\/(\S+)/g, function(m, a, b) {
            var bClean = b.replace(/[?.!,]/g, '');
            return bClean.length <= 2 ? a + b : b; // short suffix → concat; full word → swap
        });
        alts.push(masc);
        alts.push(fem);
    }

    // Deduplicate after normalizing
    var seen = {};
    var result = [];
    alts.forEach(function(a) {
        var n = normalizeHe(a);
        if (n && !seen[n]) { seen[n] = true; result.push(n); }
    });
    return result;
}

function checkAnswer(input, he) {
    var u = normalizeHe(input);
    if (!u) return false;
    return generateAlts(he).some(function(a) { return a === u; });
}

// ════════════════════════════════════════════════════════════════
// בוחן — לוגיקה
// ════════════════════════════════════════════════════════════════

var quizCards       = [];
var quizIdx         = 0;
var quizCorrect     = 0;
var quizMistakes    = [];
var quizSubmitted   = false;
var curQuizTopicIdx = 0;

function openQuiz(topicIdx) {
    curQuizTopicIdx = topicIdx;
    var topic = SHICHON[topicIdx];
    quizCards = topic.cards.slice().sort(function() { return Math.random() - 0.5; });
    quizIdx       = 0;
    quizCorrect   = 0;
    quizMistakes  = [];
    quizSubmitted = false;

    document.getElementById('quizLabel').textContent = topic.title + ' — בוחן';
    renderQuizCard();
    showView('viewQuiz');
}

function renderQuizCard() {
    var c = quizCards[quizIdx];
    var total = quizCards.length;

    document.getElementById('quizBar').style.width = ((quizIdx + 1) / total * 100) + '%';
    document.getElementById('quizProg').textContent = (quizIdx + 1) + ' / ' + total;
    document.getElementById('quizEn').textContent = c.en;

    var inp = document.getElementById('quizInput');
    inp.value = '';
    inp.className = 'quiz-input';
    inp.disabled = false;
    setTimeout(function() { inp.focus(); }, 60);

    document.getElementById('quizFeedback').innerHTML = '';
    document.getElementById('quizNextBtn').style.display    = 'none';
    document.getElementById('quizSubmitBtn').style.display  = 'inline-flex';
    quizSubmitted = false;
}

function quizKeyDown(e) {
    if (e.key === 'Enter') {
        if (!quizSubmitted) quizSubmit();
        else quizNext();
    }
}

function quizSubmit() {
    if (quizSubmitted) return;
    var c   = quizCards[quizIdx];
    var inp = document.getElementById('quizInput');
    var ok  = checkAnswer(inp.value, c.he);

    quizSubmitted = true;
    inp.disabled  = true;

    var fb = document.getElementById('quizFeedback');
    if (ok) {
        quizCorrect++;
        inp.className   = 'quiz-input correct';
        fb.innerHTML    = '<span class="fb-correct">✓ נכון!</span>';
    } else {
        inp.className   = 'quiz-input wrong';
        fb.innerHTML    = '<span class="fb-wrong">✗ התשובה: </span>' +
                          '<span dir="rtl" style="font-weight:700">' + c.he + '</span>';
        quizMistakes.push({ en: c.en, he: c.he, typed: inp.value });
    }

    var nextBtn = document.getElementById('quizNextBtn');
    nextBtn.style.display  = 'inline-flex';
    if (quizIdx === quizCards.length - 1) { nextBtn.className = 'btn-primary'; nextBtn.textContent = 'סיום ✓'; }
    else                                  { nextBtn.className = 'btn-next-img'; nextBtn.textContent = 'הבא'; }
    document.getElementById('quizSubmitBtn').style.display = 'none';
}

function quizNext() {
    if (quizIdx < quizCards.length - 1) {
        quizIdx++;
        renderQuizCard();
    } else {
        showQuizScore();
    }
}

function showQuizScore() {
    var total = quizCards.length;
    var pct   = Math.round(quizCorrect / total * 100);
    var medal = pct >= 80 ? 'gold' : pct >= 60 ? 'silver' : 'bronze';
    var icon  = pct >= 80 ? '🥇' : pct >= 60 ? '🥈' : '🥉';
    var msg   = pct === 100 ? 'מושלם! שלטת בכל הביטויים.' :
                pct >= 80   ? 'יפה מאוד! כמעט מושלם.'    :
                pct >= 60   ? 'לא רע! כדאי לחזור על החומר.' :
                              'המשך להתאמן — זה יגיע!';

    var mistakesHtml = '';
    if (quizMistakes.length) {
        mistakesHtml = '<div class="mistakes-title">שגיאות:</div>' +
            quizMistakes.map(function(m) {
                return '<div class="mistake-row">' +
                    '<span class="mistake-en" dir="ltr">' + m.en + '</span>' +
                    '<span class="mistake-arrow">←</span>' +
                    '<span class="mistake-he">' + m.he + '</span>' +
                    (m.typed ? '<span class="mistake-typed">(' + m.typed + ')</span>' : '') +
                '</div>';
            }).join('');
    }

    document.getElementById('quizScoreInner').innerHTML =
        '<div class="score-medal ' + medal + '">' + icon + '</div>' +
        '<h2>' + pct + '%</h2>' +
        '<div class="score-fraction">' + quizCorrect + ' / ' + total + '</div>' +
        '<div class="score-msg">' + msg + '</div>' +
        '<div class="score-actions">' +
            '<button class="btn-primary" onclick="openQuiz(' + curQuizTopicIdx + ')">שוב ↺</button>' +
            '<button class="btn-secondary" onclick="showView(\'viewTopics\')">חזור לנושאים</button>' +
        '</div>' +
        mistakesHtml;

    showView('viewQuizScore');
}

function speakQuiz() {
    var text = document.getElementById('quizEn').textContent;
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    if (prefVoice) u.voice = prefVoice;
    speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════════════════════
// קול
// ════════════════════════════════════════════════════════════════
var prefVoice = null;
function initVoices() {
    var v = speechSynthesis.getVoices();
    prefVoice = v.find(function(x){return x.name.includes('Zira');}) ||
                v.find(function(x){return x.lang==='en-US';}) ||
                v.find(function(x){return x.lang.startsWith('en');}) || null;
}
speechSynthesis.onvoiceschanged = initVoices;
initVoices();

function speakCurrent() {
    var text = document.getElementById('shEn').textContent;
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    if (prefVoice) u.voice = prefVoice;
    speechSynthesis.speak(u);
}

document.addEventListener('DOMContentLoaded', function() { renderUserNav(); });
if (location.search.indexOf('direct=1') !== -1) {
    openLevel(1);
    var btn = document.getElementById('topicsBackBtn');
    btn.textContent = '→ חזור לפרקים';
    btn.onclick = function() { window.location.href = 'app.html?level=elementary'; };
} else {
    showView('viewSelect');
}

window.onBackspace = function() {
    var views = ['viewSelect','viewTopics','viewCards','viewQuiz','viewQuizScore'];
    var cur = views.find(function(v) {
        var el = document.getElementById(v);
        return el && el.style.display !== 'none';
    });
    if (!cur) return;
    if (cur === 'viewTopics') {
        if (location.search.indexOf('direct=1') !== -1) window.location.href = 'app.html?level=elementary';
        else showView('viewSelect');
    } else if (cur === 'viewCards') {
        showView('viewTopics');
    } else if (cur === 'viewQuiz' || cur === 'viewQuizScore') {
        showView('viewTopics');
    }
};
