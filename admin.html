<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>לוח בקרה — למדני אנגלית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Fredoka','Segoe UI',sans-serif;background:#0b1220;color:#e2e8f0;min-height:100vh;direction:rtl}

/* ── state screens ─────────────────────────────────── */
.state-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;padding:2rem}
.state-screen h2{font-size:1.6rem;font-weight:700;color:#f1f5f9}
.state-screen p{color:#64748b;font-size:1rem}
.btn-primary{background:#2563eb;color:#fff;border:none;border-radius:0.65rem;padding:0.7rem 1.8rem;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s}
.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:0.3rem 0.85rem;font-size:0.82rem;border-radius:0.5rem;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:background 0.15s}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-success{background:#22c55e;color:#fff}.btn-success:hover{background:#16a34a}
.btn-ghost{background:rgba(255,255,255,0.08);color:#94a3b8;border:1px solid rgba(255,255,255,0.1)}.btn-ghost:hover{background:rgba(255,255,255,0.14)}

/* ── top bar ────────────────────────────────────────── */
.topbar{background:#111827;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:1.15rem;font-weight:700;color:#f1f5f9;display:flex;align-items:center;gap:0.5rem}
.topbar-logo span{color:#3b82f6}
.topbar-right{display:flex;align-items:center;gap:0.75rem}
.topbar-user{font-size:0.85rem;color:#64748b}

/* ── page layout ────────────────────────────────────── */
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
.section-title{font-size:1.05rem;font-weight:700;color:#94a3b8;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:0.75rem}

/* ── stat cards ─────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.75rem}
.stat-card{background:#151f35;border-radius:0.9rem;padding:1.1rem 1.25rem;border:1px solid rgba(255,255,255,0.06)}
.stat-val{font-size:2.1rem;font-weight:700;line-height:1;color:#f1f5f9}
.stat-lbl{font-size:0.8rem;color:#64748b;margin-top:0.3rem}
.stat-card.blue .stat-val{color:#60a5fa}
.stat-card.green .stat-val{color:#4ade80}
.stat-card.yellow .stat-val{color:#fbbf24}
.stat-card.purple .stat-val{color:#c084fc}

/* ── users table ─────────────────────────────────────── */
.table-wrap{background:#111827;border-radius:1rem;border:1px solid rgba(255,255,255,0.07);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
thead tr{background:#0f1729}
th{padding:0.8rem 1rem;text-align:right;font-size:0.75rem;font-weight:700;color:#475569;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
td{padding:0.8rem 1rem;border-top:1px solid rgba(255,255,255,0.05);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.02)}
.user-name{font-weight:700;color:#f1f5f9;font-size:0.95rem}
.user-email{font-size:0.78rem;color:#64748b;direction:ltr;text-align:right;margin-top:0.15rem}
.badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:1rem;font-size:0.75rem;font-weight:700}
.badge-premium{background:rgba(251,191,36,0.15);color:#fbbf24}
.badge-free{background:rgba(100,116,139,0.15);color:#64748b}
.date-cell{font-size:0.8rem;color:#94a3b8;white-space:nowrap}

/* ── kids detail ─────────────────────────────────────── */
.detail-row td{padding:0;background:#0d1628 !important}
.detail-inner{padding:0.75rem 1rem 0.75rem 1.5rem;border-top:none}
.kids-list{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.4rem}
.kid-chip{background:#1e293b;border-radius:0.5rem;padding:0.35rem 0.75rem;font-size:0.8rem;color:#cbd5e1;display:flex;align-items:center;gap:0.4rem}
.kid-chip .stages-done{color:#4ade80;font-size:0.72rem;font-weight:700}

/* ── empty / loading ─────────────────────────────────── */
.empty-row td{text-align:center;color:#475569;padding:2rem;font-size:0.9rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.15);border-top-color:#60a5fa;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── search ─────────────────────────────────────────── */
.toolbar{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap}
.search-input{background:#151f35;border:1px solid rgba(255,255,255,0.1);border-radius:0.6rem;padding:0.5rem 0.9rem;color:#e2e8f0;font-size:0.9rem;font-family:inherit;width:220px;direction:ltr}
.search-input::placeholder{color:#475569}
.search-input:focus{outline:none;border-color:#3b82f6}
.filter-label{font-size:0.82rem;color:#64748b}

/* ── login modal ─────────────────────────────────────── */
#fbLoginOv{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:9999;direction:rtl}
.login-box{background:#fff;border-radius:1.2rem;padding:2rem 2rem 1.5rem;width:min(92vw,360px);position:relative;text-align:center;font-family:inherit}
.login-close{position:absolute;top:0.7rem;left:0.8rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#94a3b8}
.login-title{font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:1.2rem}
.login-field{margin-bottom:0.65rem;text-align:right}
.login-field label{font-size:0.82rem;font-weight:600;color:#374151;display:block;margin-bottom:0.25rem}
.login-field input{width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e2e8f0;border-radius:0.5rem;font-size:0.95rem;box-sizing:border-box}
#fbErr{color:#ef4444;font-size:0.85rem;margin-bottom:0.65rem;min-height:1.1em}
.login-submit{width:100%;padding:0.75rem;background:#2563eb;color:#fff;border:none;border-radius:0.6rem;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:0.7rem;font-family:inherit}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:0.6rem;padding:0.7rem;border:1.5px solid #e2e8f0;border-radius:0.6rem;background:#fff;cursor:pointer;font-size:0.95rem;font-weight:600;margin-bottom:0.85rem;font-family:inherit}
.divider{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.85rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.divider span{color:#94a3b8;font-size:0.8rem}

@media(max-width:700px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  table{font-size:0.8rem}
  th,td{padding:0.6rem 0.5rem}
  .search-input{width:160px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .topbar-user{display:none}
}
</style>
</head>
<body>

<!-- ══ Login modal ══════════════════════════════════════ -->
<div id="fbLoginOv" onclick="if(event.target===this)closeLoginModal()">
  <div class="login-box" onclick="event.stopPropagation()">
    <button class="login-close" onclick="closeLoginModal()">✕</button>
    <input type="hidden" id="fbModeVal" value="login">
    <div class="login-title">כניסת מנהל</div>
    <button class="google-btn" onclick="fbSignInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.8l6-6C34.1 3.1 29.3 1 24 1 14.9 1 7.1 6.7 3.8 14.7l7 5.4C12.5 13.7 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
        <path fill="#FBBC05" d="M10.8 28.1c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7-5.4C2.3 16.6 1 20.2 1 24s1.3 7.4 3.7 10.5l7.1-5.4z"/>
        <path fill="#34A853" d="M24 47c5.4 0 9.9-1.8 13.2-4.8l-7.4-5.7c-1.8 1.2-4.1 1.9-5.8 1.9-6.2 0-11.4-4.2-13.3-9.9l-7.1 5.4C7.1 41.3 14.9 47 24 47z"/>
      </svg>
      המשך עם Google
    </button>
    <div class="divider"><span>או</span></div>
    <div class="login-field">
      <label>אימייל</label>
      <input id="fbEmail" type="email" placeholder="your@email.com" dir="ltr"
             onkeydown="if(event.key==='Enter')document.getElementById('fbPass').focus()">
    </div>
    <div class="login-field">
      <label>סיסמה</label>
      <input id="fbPass" type="password" placeholder="••••••" dir="ltr"
             onkeydown="if(event.key==='Enter')fbSubmitEmail()">
    </div>
    <div id="fbErr"></div>
    <button id="fbSubmitBtn" class="login-submit" onclick="fbSubmitEmail()">כנס ←</button>
  </div>
</div>

<!-- ══ Loading ══════════════════════════════════════════ -->
<div id="stateLoading" class="state-screen">
  <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
  <p>טוען...</p>
</div>

<!-- ══ Login prompt ══════════════════════════════════════ -->
<div id="stateLogin" class="state-screen" style="display:none">
  <div style="font-size:3rem">🔐</div>
  <h2>לוח בקרה — למדני אנגלית</h2>
  <p>כניסה מורשית למנהל בלבד</p>
  <button class="btn-primary" onclick="openLoginModal()">כניסה</button>
</div>

<!-- ══ Access denied ══════════════════════════════════════ -->
<div id="stateDenied" class="state-screen" style="display:none">
  <div style="font-size:3rem">🚫</div>
  <h2>אין הרשאה</h2>
  <p>דף זה זמין למנהל האתר בלבד</p>
  <button class="btn-primary" onclick="_firebaseAuth && _firebaseAuth.signOut()">יציאה</button>
</div>

<!-- ══ Dashboard ══════════════════════════════════════════ -->
<div id="stateDashboard" style="display:none">
  <div class="topbar">
    <div class="topbar-logo"><span>📊</span> לוח בקרה</div>
    <div class="topbar-right">
      <span class="topbar-user" id="adminEmailDisplay"></span>
      <button class="btn-sm btn-ghost" onclick="doLogout()">יציאה</button>
    </div>
  </div>

  <div class="page">
    <!-- Stats -->
    <div class="section-title">סטטיסטיקות</div>
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-val" id="statTotal">—</div>
        <div class="stat-lbl">משתמשים רשומים</div>
      </div>
      <div class="stat-card green">
        <div class="stat-val" id="statPremium">—</div>
        <div class="stat-lbl">מנויים פרמיום</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-val" id="statActive">—</div>
        <div class="stat-lbl">פעילים השבוע</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-val" id="statKids">—</div>
        <div class="stat-lbl">ילדים רשומים</div>
      </div>
    </div>

    <!-- Users table -->
    <div class="toolbar">
      <div class="section-title" style="margin-bottom:0">משתמשים</div>
      <input class="search-input" type="text" id="searchInput" placeholder="חפש שם / אימייל..." oninput="filterUsers()" dir="rtl">
      <button class="btn-sm btn-ghost" onclick="loadUsers()" title="רענן">↻ רענן</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>שם</th>
            <th>הצטרף</th>
            <th>כניסה אחרונה</th>
            <th>ילדים</th>
            <th>שלבים שהושלמו</th>
            <th>סטטוס</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr class="empty-row"><td colspan="7"><span class="spinner"></span> טוען משתמשים...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
var ADMIN_EMAIL = 'ishaieran@gmail.com';
var _allUsers   = [];
var _expandedUid = null;

// ── State helpers ────────────────────────────────────────
function showState(id) {
    ['stateLoading','stateLogin','stateDenied','stateDashboard'].forEach(function(s) {
        document.getElementById(s).style.display = s === id ? (id === 'stateDashboard' ? 'block' : 'flex') : 'none';
    });
}

// ── Firebase callbacks ───────────────────────────────────
window.onFirebaseAuth = function(fbUser) {
    if (fbUser.email !== ADMIN_EMAIL) {
        showState('stateDenied');
        return;
    }
    document.getElementById('adminEmailDisplay').textContent = fbUser.email;
    showState('stateDashboard');
    loadUsers();
};

window.onFirebaseLogout = function() {
    showState('stateLogin');
};

function doLogout() {
    if (window._firebaseAuth) window._firebaseAuth.signOut();
}

// ── Load users from Firestore ────────────────────────────
function loadUsers() {
    var db = window._firebaseDb;
    if (!db) { setTimeout(loadUsers, 500); return; }

    var tbody = document.getElementById('usersBody');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7"><span class="spinner"></span> טוען...</td></tr>';
    _expandedUid = null;

    db.collection('users').orderBy('lastLogin', 'desc').get()
        .then(function(snap) {
            _allUsers = [];
            snap.forEach(function(doc) {
                var d = doc.data();
                d._uid = doc.id;
                _allUsers.push(d);
            });
            renderStats(_allUsers);
            renderTable(_allUsers);
        })
        .catch(function(e) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="7">שגיאה בטעינה: ' + e.message + '</td></tr>';
        });
}

// ── Stats ────────────────────────────────────────────────
function renderStats(users) {
    var now     = Date.now();
    var week    = 7 * 24 * 60 * 60 * 1000;
    var premium = 0, active = 0, kids = 0;
    users.forEach(function(u) {
        if (u.premium) premium++;
        if (u.lastLogin && u.lastLogin.toMillis && now - u.lastLogin.toMillis() < week) active++;
        if (Array.isArray(u.kids)) kids += u.kids.length;
    });
    document.getElementById('statTotal').textContent   = users.length;
    document.getElementById('statPremium').textContent = premium;
    document.getElementById('statActive').textContent  = active;
    document.getElementById('statKids').textContent    = kids;
}

// ── Table ────────────────────────────────────────────────
function filterUsers() {
    var q = (document.getElementById('searchInput').value || '').toLowerCase();
    var filtered = _allUsers.filter(function(u) {
        return !q ||
            (u.name  || '').toLowerCase().includes(q) ||
            (u.email || '').toLowerCase().includes(q);
    });
    renderTable(filtered);
}

function fmtDate(ts) {
    if (!ts || !ts.toDate) return '—';
    var d = ts.toDate();
    return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}

function countDone(progress) {
    if (!progress || typeof progress !== 'object') return 0;
    var total = 0;
    Object.values(progress).forEach(function(kidP) {
        if (!kidP || typeof kidP !== 'object') return;
        Object.values(kidP).forEach(function(mod) {
            if (!mod || typeof mod !== 'object') return;
            Object.values(mod).forEach(function(stage) {
                if (stage && (stage.grammarBest !== undefined || stage.vocabBest !== undefined)) total++;
            });
        });
    });
    return total;
}

function renderTable(users) {
    var tbody = document.getElementById('usersBody');
    if (!users.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">לא נמצאו משתמשים</td></tr>';
        return;
    }
    var html = '';
    users.forEach(function(u) {
        var uid      = u._uid;
        var premium  = !!u.premium;
        var kidsArr  = Array.isArray(u.kids) ? u.kids : [];
        var done     = countDone(u.progress);
        html += '<tr data-uid="' + uid + '" onclick="toggleExpand(\'' + uid + '\')" style="cursor:pointer">' +
            '<td><div class="user-name">' + esc(u.name || '—') + '</div>' +
                 '<div class="user-email">' + esc(u.email || '—') + '</div></td>' +
            '<td class="date-cell">' + fmtDate(u.registeredAt) + '</td>' +
            '<td class="date-cell">' + fmtDate(u.lastLogin) + '</td>' +
            '<td>' + kidsArr.length + '</td>' +
            '<td>' + done + '</td>' +
            '<td><span class="badge ' + (premium ? 'badge-premium' : 'badge-free') + '">' +
                 (premium ? '⭐ פרמיום' : 'חינמי') + '</span></td>' +
            '<td><button class="btn-sm ' + (premium ? 'btn-danger' : 'btn-success') + '" ' +
                 'onclick="event.stopPropagation();togglePremium(\'' + uid + '\',' + premium + ')">' +
                 (premium ? 'בטל פרמיום' : 'הפוך פרמיום') + '</button></td>' +
        '</tr>' +
        '<tr class="detail-row" id="detail-' + uid + '" style="display:none">' +
            '<td colspan="7"><div class="detail-inner">' + renderKids(u) + '</div></td>' +
        '</tr>';
    });
    tbody.innerHTML = html;
}

function renderKids(u) {
    var kidsArr = Array.isArray(u.kids) ? u.kids : [];
    if (!kidsArr.length) return '<span style="color:#475569;font-size:0.85rem">אין ילדים רשומים</span>';
    var html = '<div style="font-size:0.8rem;color:#64748b;margin-bottom:0.4rem">ילדים:</div><div class="kids-list">';
    kidsArr.forEach(function(k) {
        var kidProgress = (u.progress && u.progress[k.id]) || {};
        var stages = 0;
        Object.values(kidProgress).forEach(function(mod) {
            if (!mod || typeof mod !== 'object') return;
            Object.values(mod).forEach(function(s) {
                if (s && (s.grammarBest !== undefined || s.vocabBest !== undefined)) stages++;
            });
        });
        var emoji = (k.gender === 'female') ? '👧' : '👦';
        html += '<div class="kid-chip">' + emoji + ' ' + esc(k.name) +
                ' <span class="stages-done">(' + stages + ' שלבים)</span></div>';
    });
    html += '</div>';
    return html;
}

function toggleExpand(uid) {
    var row = document.getElementById('detail-' + uid);
    if (!row) return;
    if (_expandedUid && _expandedUid !== uid) {
        var prev = document.getElementById('detail-' + _expandedUid);
        if (prev) prev.style.display = 'none';
    }
    var isOpen = row.style.display !== 'none';
    row.style.display = isOpen ? 'none' : 'table-row';
    _expandedUid = isOpen ? null : uid;
}

// ── Premium toggle ───────────────────────────────────────
function togglePremium(uid, currentPremium) {
    var db = window._firebaseDb;
    if (!db) return;
    db.collection('users').doc(uid).update({ premium: !currentPremium })
        .then(function() { loadUsers(); })
        .catch(function(e) {
            if (e.code === 'permission-denied') {
                alert('⚠️ נדרש עדכון הרשאות Firestore.\nעדכן את החוקים כך שהמנהל יוכל לכתוב.');
            } else {
                alert('שגיאה: ' + e.message);
            }
        });
}

function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Login modal helpers (same as index.html) ─────────────
function openLoginModal() {
    document.getElementById('fbLoginOv').style.display = 'flex';
    document.getElementById('fbModeVal').value = 'login';
    var err = document.getElementById('fbErr');
    if (err) { err.textContent = ''; }
}
function closeLoginModal() { document.getElementById('fbLoginOv').style.display = 'none'; }
function fbSignInGoogle() {
    document.getElementById('fbErr').textContent = 'טוען...';
    if (window._fbDoGoogle) window._fbDoGoogle();
    else document.getElementById('fbErr').textContent = 'Firebase לא מוכן — נסה שוב';
}
function fbSubmitEmail() {
    if (window._fbDoEmail) window._fbDoEmail();
    else document.getElementById('fbErr').textContent = 'Firebase לא מוכן — נסה שוב';
}
// stubs required by firebase-auth.js
function closeLoginModal2() {}
window.fbShowVerifyView     = function() {};
window.fbStartResendCountdown = function() {};
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-auth.js"></script>
<script src="user.js"></script>
<script src="firestore-sync.js"></script>
</body>
</html>
