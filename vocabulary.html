<!-- ═══ 0b. בחירת נושא ═══════════════════════════════════════════ -->
<div id="viewTopics" class="reading-wrap" style="max-width:1200px">

<!-- ═══ 1. לימוד מילים ════════════════════════════════════════════ -->
<div id="viewLearn" class="reading-wrap" style="display:none">
    <button class="back-link" onclick="backToSelect()">→ חזור לנושאים</button>

        <h2 id="learnLabel" style="font-size:1.5rem;font-weight:700;color:var(--navy);margin:0"></h2>
        <button id="combosBtn" onclick="startCombos()" style="display:none;background:none;border:none;color:#3b82f6;font-size:0.9rem;cursor:pointer;padding:0;font-family:inherit;">תרגול צירופי מילים ←</button>
    </div>
    <div class="vocab-grid" id="vocabGrid"></div>
    <div class="vocab-quiz-btn">
        <button class="btn-start-quiz-img" onclick="startQuiz()">

            <div class="btn-quiz-label">התחל בוחן</div>
        </button>
    </div>
</div>

<!-- ═══ 1b. דף הסבר (נושאים עם intro) ═══════════════════════════ -->
<div id="viewIntro" class="reading-wrap" style="display:none">

</div>

<!-- ═══ 1c. תרגול צירופי מילים ═══════════════════════════════════ -->
<div id="viewCombos" class="reading-wrap" style="display:none">
    <button class="back-link" onclick="showVocabWords()">→ חזור לאוצר המילים</button>
    <h2 id="combosLabel" style="text-align:center;font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:0.4rem"></h2>
    <div style="text-align:center;margin-bottom:1.2rem">
        <span id="combosProg" style="font-size:1.3rem;font-weight:700;color:var(--blue)"></span>
    </div>
    <div class="quiz-card">
        <div class="quiz-prompt">תרגם לעברית:</div>
        <div class="quiz-en" id="combosPhrase" dir="ltr"></div>
        <div class="quiz-input-wrap">
            <input type="text" id="combosInput" class="quiz-input" placeholder="כתוב כאן בעברית..." dir="rtl" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <div class="quiz-feedback" id="combosFeedback"></div>
        <div class="quiz-btns">
            <div class="quiz-btn-main-slot">
                <button class="btn-check-3d" id="combosBtnCheck" onclick="checkCombo()">✓ בדוק</button>
                <button class="btn-check-3d" id="combosBtnNext" onclick="nextCombo()" style="visibility:hidden">הבא</button>
            </div>
        </div>
    </div>
</div>

<!-- ═══ 2. בוחן ══════════════════════════════════════════════════ -->
<div id="viewQuiz" class="reading-wrap" style="display:none">
    <button class="back-link" onclick="backToLearn()">→ חזור לאוצר המילים</button>
    <h2 id="quizLabel" style="text-align:center;font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:0.4rem"></h2>
    <div style="text-align:center;margin-bottom:1.2rem">
        <span id="quizProg" style="font-size:1.3rem;font-weight:700;color:var(--blue)"></span>
    </div>
    <div class="quiz-card">
        <div class="quiz-prompt">תרגם לעברית:</div>
        <div class="quiz-en" id="quizWord" dir="ltr"></div>
        <button class="play-btn" id="quizAudio" onclick="speakQuizWord()" style="margin-bottom:1.5rem"></button>
        <div class="quiz-input-wrap">
            <input
                type="text"
                id="quizInput"
                class="quiz-input"
                placeholder="כתוב כאן בעברית..."
                dir="rtl"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
            >
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <div class="quiz-btns">
            <div class="quiz-btn-main-slot">
                <button class="btn-check-3d" id="btnCheck" onclick="checkAnswer()">✓ בדוק</button>
                <button class="btn-check-3d" id="btnNext" onclick="nextQuizWord()" style="visibility:hidden">הבא</button>
            </div>
        </div>
    </div>
</div>

<!-- ═══ 3. תוצאות ════════════════════════════════════════════════ -->
<div id="viewScore" class="reading-wrap" style="display:none">
    <div class="score-card">
        <h2 id="scoreTitle" style="margin-bottom:0.75rem"></h2>
        <div style="position:relative;display:inline-block;margin-bottom:1rem">
            <img id="scoreImg" src="" alt="" style="width:560px;max-width:100%;display:block">
            <div id="scoreCheck" style="display:none;position:absolute;top:40%;left:5%;color:#16a34a;font-size:6rem;font-weight:900;line-height:1">✓</div>
        </div>
        <div class="score-fraction" id="scoreFraction" dir="ltr"></div>
        <p class="score-msg" id="scoreMsg"></p>
        <div class="score-actions">
            <button class="btn-check-3d btn-sm" onclick="retryQuiz()" style="white-space:nowrap">נסה שוב</button>
            <button class="btn-check-3d btn-sm" onclick="backToLearn()" style="white-space:nowrap">חזור לאוצר המילים</button>
        </div>
        <div id="scoreMistakes"></div>
    </div>
</div>

var prefVoice = null;
function initVoices() {
    var v = speechSynthesis.getVoices();
    prefVoice = v.find(function(x){return x.name.includes('Zira');}) ||
                v.find(function(x){return x.lang==='en-US';}) ||
                v.find(function(x){return x.lang.startsWith('en');}) || null;
}
speechSynthesis.onvoiceschanged = initVoices;
initVoices();

function speak(text) {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.65;
    if (prefVoice) u.voice = prefVoice;
    speechSynthesis.speak(u);
}

var selectMode = false;
var selectedIndices = [];

function initStageCards() {
    var hasUser  = typeof getUser === 'function';
    var u        = hasUser ? getUser() : null;
    var vocabP   = (hasUser && typeof getProgress === 'function') ? (getProgress()['vocabulary'] || {}) : {};

    // סיכום התקדמות
    var sumEl = document.getElementById('vocabSummary');
    if (sumEl) {
        if (u) {
            var levelTotal = VOCAB.filter(function(s){ return (s.level||1) === curLevel; }).length;
            var doneCount = 0;
            for (var k = 0; k < VOCAB.length; k++) {
                if ((VOCAB[k].level||1) === curLevel && vocabP[k] && vocabP[k].vocabBest !== undefined) doneCount++;
            }
            if (doneCount > 0) {
                sumEl.innerHTML = '<div style="text-align:center;font-style:italic;font-size:1.2rem;font-weight:800;margin-bottom:1rem;background:linear-gradient(90deg,#16a34a,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">השלמת ' + doneCount + ' מתוך ' + levelTotal + '</div>';
            } else {
                sumEl.innerHTML = '';
            }
            // כפתור בוחן על הנלמד
            var learnedBtn = document.getElementById('btnLearnedQuiz');
            var learnedCnt = document.getElementById('learnedQuizCount');
            if (learnedBtn) {
                if (doneCount > 0) {
                    var learnedWords = 0;
                    for (var j = 0; j < VOCAB.length; j++) {
                        if (vocabP[j] && vocabP[j].vocabBest !== undefined) learnedWords += VOCAB[j].words.length;
                    }
                    learnedCnt.textContent = '(' + learnedWords + ' מילים)';
                    learnedBtn.style.display = '';
                } else {
                    learnedBtn.style.display = 'none';
                }
            }
        } else {
            sumEl.innerHTML = '';
            var lb = document.getElementById('btnLearnedQuiz');
            if (lb) lb.style.display = 'none';
        }
    }

    // אריחים — מסנן לפי רמה
    var levelItems = [];
    VOCAB.forEach(function(s, i) { if ((s.level||1) === curLevel) levelItems.push({s:s, i:i}); });

    document.getElementById('stageCards').innerHTML = levelItems.map(function(item, idx) {
        var s = item.s, i = item.i;
        var tp         = vocabP[i];
        var score      = (u && tp && tp.vocabBest !== undefined) ? Math.min(100, tp.vocabBest) : undefined;
        var isSelected = selectedIndices.indexOf(i) !== -1;
        var bottomHtml;
        var scoreHtml = '';
        if (score !== undefined) {
            var cls = score >= 80 ? 'tsc-green' : score >= 60 ? 'tsc-ok' : 'tsc-low';
            scoreHtml = '<div class="topic-tile-score ' + cls + '">✓ ' + score + '%</div>';
        }
        var wordCountHtml = '<div class="topic-tile-count">' + s.words.length + ' מילים</div>';
        var tileExtra = score !== undefined ? (score >= 80 ? ' tile-done' : ' tile-attempted') : '';
        if (isSelected) tileExtra += ' tile-selected';
        var isLocked  = FREE_VOCAB_INDICES.indexOf(i) === -1 && !isPremium();
        if (isLocked) tileExtra += ' tile-locked';
        var clickFn   = selectMode ? 'toggleTile(' + i + ')' : (isLocked ? 'showPaywall()' : 'selectStage(' + i + ')');
        var checkMark = selectMode ? '<div class="tile-checkbox">' + (isSelected ? '✓' : '') + '</div>' : '';
        var lockBadge = isLocked ? '<div style="position:absolute;top:6px;left:6px;background:rgba(15,23,42,0.65);color:#fff;border-radius:8px;padding:2px 7px;font-size:0.72rem;font-weight:700;pointer-events:none">🔒</div>' : '';
        var numHtml = s.combos
            ? '<div class="tile-num-row"><div class="tile-number">' + (idx + 1) + '</div><div class="tile-combos-tag">כולל תרגול</div></div>'
            : '<div class="tile-number">' + (idx + 1) + '</div>';
        var bottomHtml = '<div class="tile-bottom-row" dir="ltr">' + wordCountHtml + scoreHtml + '</div>';
        if (s.img) {
            return '<div class="topic-tile topic-tile-has-img' + tileExtra + '" onclick="' + clickFn + '">' +
                checkMark +
                numHtml +
                '<div class="topic-tile-he">' + s.title + '</div>' +
                '<img src="' + s.img + '" class="topic-tile-img" alt="' + s.title + '">' +
                bottomHtml +
                lockBadge +
            '</div>';
        }
        return '<div class="topic-tile' + tileExtra + '" onclick="' + clickFn + '">' +
            checkMark +
            numHtml +
            '<div class="topic-tile-he">' + s.title + '</div>' +
            '<div class="topic-tile-en">' + s.desc + '</div>' +
            bottomHtml +
            lockBadge +
        '</div>';
    }).join('');
}

function toggleSelectMode() {
    selectMode = !selectMode;
    selectedIndices = [];
    var bar = document.getElementById('selectActionBar');
    var menuWrap = document.getElementById('quizMenuWrap');
    bar.style.display = selectMode ? 'flex' : 'none';
    menuWrap.style.display = selectMode ? 'none' : 'inline-block';
    updateSelectCount();
    initStageCards();
}

function toggleTile(i) {
    if (FREE_VOCAB_INDICES.indexOf(i) === -1 && !isPremium()) { showPaywall(); return; }
    var idx = selectedIndices.indexOf(i);
    if (idx === -1) selectedIndices.push(i);
    else selectedIndices.splice(idx, 1);
    updateSelectCount();
    initStageCards();
}

function updateSelectCount() {
    var totalWords = selectedIndices.reduce(function(sum, i) { return sum + VOCAB[i].words.length; }, 0);
    var el  = document.getElementById('selectCount');
    var btn = document.getElementById('btnStartCustom');
    if (selectedIndices.length === 0) {
        el.textContent = 'לא נבחרו כרטיסיות';
        btn.disabled = true;
        btn.style.opacity = '0.4';
        btn.style.cursor = 'default';
    } else {
        el.textContent = selectedIndices.length + ' כרטיסיות · ' + totalWords + ' מילים';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
    }
}

function startLearnedQuiz() {
    if (!isPremium()) { showPaywall(); return; }
    var hasUser = typeof getUser === 'function';
    var u = hasUser ? getUser() : null;
    var vocabP = (hasUser && typeof getProgress === 'function') ? (getProgress()['vocabulary'] || {}) : {};
    var all = [];
    VOCAB.forEach(function(s, i) {
        if ((s.level||1)===curLevel && u && vocabP[i] && vocabP[i].vocabBest !== undefined) all = all.concat(s.words);
    });
    if (!all.length) return;
    isFullQuiz = true;
    quizWords = shuffleArr(all);
    quizIdx = 0; quizScore = 0; quizAnswersMap = {};
    document.getElementById('quizLabel').textContent = 'בוחן על הנלמד';
    showView('viewQuiz');
    renderQuizWord();
}

function startCustomQuiz() {
    if (!isPremium()) { showPaywall(); return; }
    if (!selectedIndices.length) return;
    var all = [];
    selectedIndices.forEach(function(i) { all = all.concat(VOCAB[i].words); });
    isFullQuiz = true;
    quizWords = shuffleArr(all);
    quizIdx = 0; quizScore = 0; quizAnswersMap = {};
    document.getElementById('quizLabel').textContent = 'בוחן — ' + selectedIndices.length + ' נושאים';
    selectMode = false; selectedIndices = [];
    document.getElementById('selectActionBar').style.display = 'none';
    document.getElementById('quizMenuWrap').style.display = 'inline-block';
    showView('viewQuiz');
    renderQuizWord();
}

// ════════════════════════════════════════════════════════════════
var combosWords = [];
var combosIdx   = 0;
var combosScore = 0;
var combosChecked = false;

function startCombos() {
    var s = VOCAB[curStageIdx];
    combosWords   = shuffleArr(s.combos.slice());
    combosIdx     = 0;
    combosScore   = 0;
    document.getElementById('combosLabel').textContent = 'צירופי מילים — ' + s.title;
    showView('viewCombos');
    renderCombo();
}

function renderCombo() {
    combosChecked = false;
    var w = combosWords[combosIdx];
    document.getElementById('combosPhrase').textContent = w.en;
    document.getElementById('combosProg').textContent = (combosIdx + 1) + ' / ' + combosWords.length;
    var inp = document.getElementById('combosInput');
    inp.value = '';
    inp.className = 'quiz-input';
    inp.disabled = false;
    document.getElementById('combosFeedback').innerHTML = '';
    document.getElementById('combosBtnCheck').style.visibility = 'visible';
    document.getElementById('combosBtnNext').style.visibility  = 'hidden';
    setTimeout(function(){ inp.focus(); }, 80);
}

function checkCombo() {
    if (combosChecked) return;
    combosChecked = true;
    var w   = combosWords[combosIdx];
    var inp = document.getElementById('combosInput');
    var u   = normAns(inp.value);
    var accepted = [normAns(w.he)];
    if (w.alts) w.alts.forEach(function(a){ accepted.push(normAns(a)); });
    var correct = accepted.indexOf(u) !== -1;
    if (correct) combosScore++;
    inp.className = 'quiz-input ' + (correct ? 'input-correct' : 'input-wrong');
    inp.disabled  = true;
    document.getElementById('combosFeedback').innerHTML = correct
        ? '<div class="quiz-result correct">✓ נכון!</div>'
        : '<div class="quiz-result wrong">✗ &nbsp;' + w.he + '</div>';
    document.getElementById('combosBtnCheck').style.visibility = 'hidden';
    document.getElementById('combosBtnNext').style.visibility  = 'visible';
}

function nextCombo() {
    combosIdx++;
    if (combosIdx >= combosWords.length) {
        var pct = Math.round(combosScore / combosWords.length * 100);
        var cls = pct >= 80 ? 'score-great' : pct >= 60 ? 'score-ok' : 'score-low';
        document.getElementById('combosFeedback').innerHTML = '';
        document.getElementById('combosPhrase').innerHTML =
            '<div class="' + cls + '" style="font-size:2rem;font-weight:800">' + pct + '%</div>' +
            '<div style="font-size:1rem;color:var(--text-muted)">' + combosScore + ' מתוך ' + combosWords.length + ' נכון</div>';
        document.getElementById('combosProg').textContent = '';
        document.getElementById('combosInput').style.display = 'none';
        document.getElementById('combosBtnCheck').style.visibility = 'hidden';
        document.getElementById('combosBtnNext').innerHTML = 'נסה שוב';
        document.getElementById('combosBtnNext').onclick = function(){ document.getElementById('combosInput').style.display=''; startCombos(); };
        document.getElementById('combosBtnNext').style.visibility = 'visible';
        return;
    }
    renderCombo();
}

document.addEventListener('keydown', function(e){
    if (document.getElementById('viewCombos').style.display === 'none') return;
    if (e.key === 'Enter') {
        if (!combosChecked) checkCombo();
        else if (combosIdx < combosWords.length) nextCombo();
    }
});

function startQuiz() {
    isFullQuiz = false;
    var s = VOCAB[curStageIdx];
    quizWords      = shuffleArr(s.words.slice());
    quizIdx        = 0;
    quizScore      = 0;
    quizAnswersMap = {};

    showView('viewQuiz');
    renderQuizWord();
}

function startFullQuiz() {
    if (!isPremium()) { showPaywall(); return; }
    isFullQuiz = true;
    var all = [];
    VOCAB.forEach(function(s) { if ((s.level||1)===curLevel) all = all.concat(s.words); });
    quizWords      = shuffleArr(all);
    quizIdx        = 0;
    quizScore      = 0;
    quizAnswersMap = {};
    document.getElementById('quizLabel').textContent = 'בוחן כללי — כל המילים';
    showView('viewQuiz');
    renderQuizWord();

function renderQuizWord() {
    var w = quizWords[quizIdx];
    quizChecked = false;
    document.getElementById('quizWord').textContent = w.en;
    document.getElementById('quizProg').textContent = quizWords.length + ' / ' + (quizIdx+1);
    var inp = document.getElementById('quizInput');
    inp.value = '';
    inp.className = 'quiz-input';
    inp.disabled = false;
    document.getElementById('quizFeedback').innerHTML = '';
    document.getElementById('btnCheck').style.visibility = 'visible';
    document.getElementById('btnNext').style.visibility  = 'hidden';
    setTimeout(function(){ inp.focus(); }, 80);
}

function speakQuizWord() {
    speak(quizWords[quizIdx].en);
}

function normAns(s) { return s.replace(/\s+/g,' ').trim(); }
function isCorrectAnswer(userInput, word) {
    var u = normAns(userInput);
    if (u === normAns(word.he)) return true;
    if (word.alts) {
        for (var i=0; i<word.alts.length; i++) {
            if (u === normAns(word.alts[i])) return true;
        }
    }
    return false;
}

function checkAnswer() {
    if (quizChecked) return;
    var w   = quizWords[quizIdx];
    var inp = document.getElementById('quizInput');
    var val = inp.value;
    var fb  = document.getElementById('quizFeedback');

    if (!val.trim()) {
        fb.innerHTML = '<span style="color:var(--gray-txt)">נא להקליד תשובה</span>';
        inp.focus();
        return;
    }

    quizChecked = true;
    inp.disabled = true;

    var correct = isCorrectAnswer(val, w);
    // עדכון המפה לפי אינדקס — מבטיח שכל מילה נספרת פעם אחת בלבד
    var prev = quizAnswersMap[quizIdx];
    if (prev !== undefined && prev.correct) quizScore--;
    quizAnswersMap[quizIdx] = { correct: correct, typed: val };
    if (correct) quizScore++;

    if (correct) {
        inp.classList.add('correct');
        fb.innerHTML = '<span class="fb-correct">נכון!</span>';
    } else {
        inp.classList.add('wrong');
        fb.innerHTML = '<span class="fb-wrong">לא נכון —</span> ' +
            'התשובה הנכונה: <strong dir="rtl">' + w.he + '</strong>';
    }

    document.getElementById('btnCheck').style.visibility = 'hidden';
    if (quizIdx < quizWords.length - 1) {
        document.getElementById('btnNext').style.visibility = 'visible';
        setTimeout(function(){ document.getElementById('btnNext').focus(); }, 100);
    } else {
        setTimeout(showScore, 800);
    }
}

function submitOrNext() {
    if (!quizChecked) checkAnswer();
    else if (quizIdx < quizWords.length - 1) nextQuizWord();
}

function nextQuizWord() {
    quizIdx++;
    renderQuizWord();
}

function prevQuizWord() {
    if (quizIdx === 0) return;
    quizIdx--;
    renderQuizWord();
}

function showScore() {
    var total  = quizWords.length;
    var pct    = Math.min(100, Math.round(quizScore / total * 100));
    var medal  = pct === 100 ? '★' : pct >= 80 ? '✓' : pct >= 60 ? '~' : '✗';
    var medalCls = pct >= 80 ? 'gold' : pct >= 60 ? 'silver' : 'bronze';
    var title  = pct === 100 ? 'מושלם!' : pct >= 80 ? 'כל הכבוד!' : pct >= 60 ? 'לא רע!' : 'כדאי לחזור';
    var scoreDisplay = Math.min(quizScore, total);
    var msg    = 'ענית נכון על ' + scoreDisplay + ' מתוך ' + total + ' שאלות (' + pct + '%)';

    var imgSrc = pct > 90 ? 'images/vocabulary/בוחן 1.png' : pct >= 70 ? 'images/vocabulary/בוחן 2.png' : 'images/vocabulary/בוחן 3.png';
    document.getElementById('scoreImg').src = imgSrc;
    document.getElementById('scoreCheck').style.display = pct > 90 ? 'flex' : 'none';
    document.getElementById('scoreTitle').textContent  = title;
    document.getElementById('scoreFraction').textContent = scoreDisplay + ' / ' + total;
    document.getElementById('scoreMsg').textContent    = msg;

    // בנה רשימת טעויות מהמפה — כל מילה מופיעה פעם אחת (התשובה האחרונה)
    var mistakes = [];
    for (var i = 0; i < quizWords.length; i++) {
        var ans = quizAnswersMap[i];
        if (ans && !ans.correct) mistakes.push({ word: quizWords[i], typed: ans.typed });
    }

    var mistakesEl = document.getElementById('scoreMistakes');
    if (mistakes.length > 0) {
        mistakesEl.innerHTML =
            '<div class="mistakes-title">מה לחזור עליו:</div>' +
            mistakes.map(function(m) {
                return '<div class="mistake-row">' +
                    '<span class="mistake-en" dir="ltr">' + m.word.en + '</span>' +
                    '<span class="mistake-arrow">→</span>' +
                    '<span class="mistake-he">' + m.word.he + '</span>' +
                    '<span class="mistake-typed">(הקלדת: ' + m.typed + ')</span>' +
                '</div>';
            }).join('');
    } else {
        mistakesEl.innerHTML = '';
    }

    if (!isFullQuiz && typeof logProgress === 'function') {
        logProgress('vocabulary', curStageIdx, 'vocabQuiz', pct);
    }
    showView('viewScore');
}

function retryQuiz() {
    if (isFullQuiz) {
        var all = [];
        VOCAB.forEach(function(s) { all = all.concat(s.words); });
        quizWords = shuffleArr(all);
    } else {
        quizWords = shuffleArr(VOCAB[curStageIdx].words.slice());
    }
    quizIdx        = 0;
    quizScore      = 0;
    quizAnswersMap = {};
    showView('viewQuiz');
    renderQuizWord();
}

// ════════════════════════════════════════════════════════════════
// עזר
// ════════════════════════════════════════════════════════════════
function shuffleArr(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
}

// ════════════════════════════════════════════════════════════════
// Enter — בדוק / הבא
// ════════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (document.getElementById('viewQuiz').style.display === 'none') return;
    // כשה-btnNext ממוקד, הדפדפן יטפל בלחיצה בעצמו — לא נפעיל גם את submitOrNext
    if (document.activeElement && document.activeElement.id === 'btnNext') return;
    submitOrNext();
});

// ════════════════════════════════════════════════════════════════
initStageCards();
var totalWords = VOCAB.reduce(function(sum,s){ return sum + s.words.length; }, 0);
document.getElementById('fullQuizCount').textContent = totalWords + ' מילים';
openLevel(1);

window.onBackspace = function() {
    var cur = VIEWS.find(function(v) {
        var el = document.getElementById(v);
        return el && el.style.display !== 'none';
    });
    if (!cur) return;
    if (cur === 'viewTopics') {
        window.location.href = 'app.html?level=elementary';
    } else if (cur === 'viewLearn' || cur === 'viewIntro' || cur === 'viewQuiz') {
        backToSelect();
    } else if (cur === 'viewScore') {
        backToSelect();
    }
};
</script>
