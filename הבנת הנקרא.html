  // ── שלב 2 ──────────────────────────────────────────────────

// ════════════════════════════════════════════════════════════════
// מצב
// ════════════════════════════════════════════════════════════════
var curLevel    = 0;
var curPassage  = 0;
var userAnswers = [];
var levelCorrect = 0, levelTotal = 0;
var answered    = false;
var isDirect    = location.search.indexOf('direct=1') !== -1;

// ════════════════════════════════════════════════════════════════
// ניווט
// ════════════════════════════════════════════════════════════════
var VIEWS = ['viewSelect','viewPassage','viewDone'];
function showView(id) {
    VIEWS.forEach(function(v){ document.getElementById(v).style.display = 'none'; });
    document.getElementById(id).style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
}

function toggleNavMenu() {
    var p = document.getElementById('navMenuPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

// ════════════════════════════════════════════════════════════════
// מסך בחירת שלב
// ════════════════════════════════════════════════════════════════
function buildSelectNav() {
    var backLabel = isDirect ? '→ חזור לפרקים' : '→ חזור';
    var backAction = isDirect ? 'window.location.href=\'index.html?level=elementary\'' : 'window.history.back()';
    document.getElementById('selectNav').innerHTML =
        '<button class="back-link" onclick="' + backAction + '" style="margin-bottom:0.8rem">' + backLabel + '</button>';
}

function buildLevelGrid() {
    var loggedIn = typeof getUser === 'function' && !!getUser();
    var p = loggedIn && typeof getProgress === 'function' ? (getProgress()['reading'] || {}) : {};
    var html = '';
    READINGS.forEach(function(lvl, i) {
        var saved = loggedIn ? (p[i] || {}) : {};
        var done  = saved.best !== undefined;
        var score = done ? saved.best : null;
        var scoreHtml = done ? '<div class="rc-level-score">✓ ציון: ' + score + '%</div>' : '';
        html += '<div class="rc-level-card ' + (done ? 'done' : '') + '" onclick="openLevel(' + i + ')">' +
            '<div class="rc-level-num">' + lvl.level + '</div>' +
            '<div class="rc-level-name">' + lvl.name + '</div>' +
            '<div class="rc-level-desc">' + lvl.desc + '</div>' +
            scoreHtml +
        '</div>';
    });
    document.getElementById('levelGrid').innerHTML = html;
}

function openLevel(i) {
    curLevel   = i;
    curPassage = 0;
    levelCorrect = 0;
    levelTotal   = 0;
    showPassage();
}

function backToSelect() {
    buildLevelGrid();
    showView('viewSelect');
}

// ════════════════════════════════════════════════════════════════
// קטע קריאה
// ════════════════════════════════════════════════════════════════
function showPassage() {
    answered   = false;
    userAnswers = [];
    var lvl = READINGS[curLevel];
    var pas = lvl.passages[curPassage];

    // כותרת ותגית
    document.getElementById('passageLevelLabel').textContent =
        'שלב ' + lvl.level + ' — קטע ' + (curPassage + 1) + ' מתוך 3';

    // נקודות התקדמות
    var dotsHtml = '';
    for (var d = 0; d < 3; d++) {
        var cls = d < curPassage ? 'done' : (d === curPassage ? 'active' : '');
        dotsHtml += '<div class="rc-dot ' + cls + '"></div>';
    }
    document.getElementById('passageDots').innerHTML = dotsHtml;

    // כפתור חזרה
    document.getElementById('passageBackBtn').onclick = backToSelect;

    // טקסט
    document.getElementById('passageTitle').textContent = pas.title;
    document.getElementById('passageText').textContent  = pas.text;

    // שאלות
    var qHtml = '';
    pas.questions.forEach(function(q, qi) {
        qHtml += '<div class="rc-question" id="q' + qi + '">' +
            '<div class="rc-q-text">' + (qi+1) + '. ' + q.q + '</div>' +
            '<div class="rc-options">';
        q.opts.forEach(function(opt, oi) {
            qHtml += '<div class="rc-option" id="q' + qi + 'o' + oi + '" onclick="selectOption(' + qi + ',' + oi + ')">' +
                '<div class="rc-option-dot"></div>' + opt +
            '</div>';
        });
        qHtml += '</div></div>';
    });
    document.getElementById('passageQuestions').innerHTML = qHtml;

    document.getElementById('checkBtn').style.display = '';
    document.getElementById('nextBtn').style.display  = 'none';

    showView('viewPassage');
}

function selectOption(qi, oi) {
    if (answered) return;
    var pas = READINGS[curLevel].passages[curPassage];
    // הסר בחירה קודמת באותה שאלה
    pas.questions[qi].opts.forEach(function(_, idx) {
        document.getElementById('q' + qi + 'o' + idx).classList.remove('selected');
    });
    document.getElementById('q' + qi + 'o' + oi).classList.add('selected');
    userAnswers[qi] = oi;
}

function checkAnswers() {
    var pas = READINGS[curLevel].passages[curPassage];
    var allAnswered = true;
    pas.questions.forEach(function(q, qi) {
        if (userAnswers[qi] === undefined) allAnswered = false;
    });
    if (!allAnswered) {
        alert('יש לענות על כל השאלות לפני הבדיקה.');
        return;
    }

    answered = true;
    var correct = 0;
    pas.questions.forEach(function(q, qi) {
        var chosen = userAnswers[qi];
        q.opts.forEach(function(_, oi) {
            var el  = document.getElementById('q' + qi + 'o' + oi);
            var dot = el.querySelector('.rc-option-dot');
            el.classList.remove('selected');
            if (oi === q.ans) {
                el.classList.add(chosen === q.ans ? 'correct' : 'show-correct');
                dot.textContent = '✓';
            }
            if (oi === chosen && chosen !== q.ans) {
                el.classList.add('wrong');
                dot.textContent = '✗';
            }
        });
        if (chosen === q.ans) correct++;
    });

    levelCorrect += correct;
    levelTotal   += pas.questions.length;

    document.getElementById('checkBtn').style.display = 'none';
    var isLast = curPassage === 2;
    var nextBtn = document.getElementById('nextBtn');
    if (isLast) { nextBtn.className = 'btn-primary'; nextBtn.textContent = 'סיום השלב ←'; }
    else        { nextBtn.className = 'btn-next-img'; nextBtn.textContent = 'קטע הבא'; }
    nextBtn.style.display = '';
}

function nextPassage() {
    if (curPassage < 2) {
        curPassage++;
        showPassage();
    } else {
        showLevelDone();
    }
}

// ════════════════════════════════════════════════════════════════
// השמעה
// ════════════════════════════════════════════════════════════════
var prefVoice = null;
function initVoices() {
    var v = speechSynthesis.getVoices();
    prefVoice = v.find(function(x){ return x.name.includes('Zira'); }) ||
                v.find(function(x){ return x.lang === 'en-US'; }) ||
                v.find(function(x){ return x.lang.startsWith('en'); }) || null;
}
speechSynthesis.onvoiceschanged = initVoices;
initVoices();

function listenPassage() {
    speechSynthesis.cancel();
    var txt = document.getElementById('passageText').textContent;
    var u   = new SpeechSynthesisUtterance(txt);
    u.lang  = 'en-US'; u.rate = 0.88;
    if (prefVoice) u.voice = prefVoice;
    speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════════════════════
// סיום שלב
// ════════════════════════════════════════════════════════════════
function showLevelDone() {
    var pct  = Math.round(levelCorrect / levelTotal * 100);
    var lvl  = READINGS[curLevel];
    var emoji, cls, msg;
    if (pct >= 85) { emoji = '🏆'; cls = 'great'; msg = 'כל הכבוד! ביצועים מצוינים!'; }
    else if (pct >= 60) { emoji = '👍'; cls = 'ok'; msg = 'יפה! אפשר לשפר עוד.'; }
    else { emoji = '💪'; cls = 'low'; msg = 'כדאי לקרוא שוב את הקטעים ולנסות שנית.'; }

    // שמור התקדמות — רק אם יש משתמש רשום
    if (typeof getUser === 'function' && getUser() && typeof getProgress === 'function') {
        var p = getProgress();
        if (!p.reading) p.reading = {};
        var prev = p.reading[curLevel] ? p.reading[curLevel].best : 0;
        if (pct > (prev || 0)) {
            p.reading[curLevel] = { best: pct };
            if (typeof saveProgress === 'function') saveProgress(p);
        }
    }

    document.getElementById('doneContent').innerHTML =
        '<div class="rc-score-card">' +
            '<div class="rc-score-emoji">' + emoji + '</div>' +
            '<div style="font-size:1.1rem;font-weight:700;color:#1e293b;margin-bottom:0.3rem">שלב ' + lvl.level + ' — ' + lvl.name + '</div>' +
            '<div class="rc-score-big ' + cls + '">' + pct + '%</div>' +
            '<div class="rc-score-msg">' + levelCorrect + ' מתוך ' + levelTotal + ' תשובות נכונות<br>' + msg + '</div>' +
            '<div style="display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap">' +
                '<button class="btn-secondary" onclick="openLevel(' + curLevel + ')">נסה שנית ↺</button>' +
                '<button class="btn-primary" onclick="backToSelect()">חזור לשלבים</button>' +
                (curLevel < 9 ? '<button class="btn-primary" onclick="openLevel(' + (curLevel+1) + ')">שלב הבא ←</button>' : '') +
            '</div>' +
        '</div>';

    showView('viewDone');
}

// ════════════════════════════════════════════════════════════════
// אתחול
// ════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
    if (typeof renderUserNav === 'function') renderUserNav();
    buildSelectNav();
    buildLevelGrid();
    showView('viewSelect');
});

window.onBackspace = function() {
    var views = ['viewSelect','viewPassage','viewDone'];
    var cur = views.find(function(v) {
        var el = document.getElementById(v);
        return el && el.style.display !== 'none';
    });
    if (!cur) return;
    if (cur === 'viewSelect') {
        if (isDirect) window.location.href = 'index.html?level=elementary';
    } else {
        backToSelect();
    }
};

</script>
</body>
</html>
